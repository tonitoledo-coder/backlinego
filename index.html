<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Base44 APP</title>
    <!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BacklineGo">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js');
    });
  }
</script>
  </head>
  <body>
    <div id="ios-banner" style="display:none; position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:#0a0a0f; border:1px solid #22c55e; color:#fff; padding:14px 20px;
  border-radius:12px; font-family:sans-serif; font-size:14px; z-index:9999;
  box-shadow:0 0 20px rgba(34,197,94,0.3); max-width:320px; text-align:center;
  animation: fadeIn 0.4s ease;">
  📲 Para instalar la app, pulsa <strong>Compartir</strong> en Safari y selecciona <strong>"Añadir a pantalla de inicio"</strong>.
  <br><br>
  <button onclick="document.getElementById('ios-banner').style.display='none'; localStorage.setItem('iosBannerShown','1')"
    style="background:#22c55e; color:#000; border:none; padding:8px 16px; border-radius:8px; cursor:pointer; font-weight:bold;">
    Entendido
  </button>
</div>

<script>
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone;
  const shown = localStorage.getItem('iosBannerShown');
  if (isIOS && !isStandalone && !shown) {
    document.getElementById('ios-banner').style.display = 'block';
  }
</script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
